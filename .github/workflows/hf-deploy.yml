name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret not set — skip HF deploy."
            echo "To enable: create Space at huggingface.co/new-space then add HF_TOKEN to GitHub repo secrets."
            exit 0
          fi
          pip install huggingface_hub
          python << 'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "Vekri/automl-studio-classification"

          try:
              api.create_repo(repo_id=repo_id, repo_type="space", space_sdk="streamlit", exist_ok=True)
          except Exception as e:
              print(f"Repo create note: {e}")

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[".git/*", ".github/*", "__pycache__/*", ".pytest_cache/*", "*.pyc"],
              commit_message="Deploy from GitHub Actions",
          )
          print(f"Deployed to https://huggingface.co/spaces/{repo_id}")
          PYEOF
