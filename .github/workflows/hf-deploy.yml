name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      hf_token:
        description: Hugging Face write token (skip if HF_TOKEN secret is set)
        required: false
        type: string

jobs:
  deploy:
    if: ${{ secrets.HF_TOKEN != '' || (github.event_name == 'workflow_dispatch' && github.event.inputs.hf_token != '') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hugging Face (Docker Space)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN != '' && secrets.HF_TOKEN || github.event.inputs.hf_token }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN is missing. Add repo secret HF_TOKEN or run workflow with hf_token input."
            exit 1
          fi
          pip install huggingface_hub
          python << 'PYEOF'
          import os
          from huggingface_hub import HfApi, create_repo

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          repo_id = "Vekri/automl-studio-classification"

          create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
              token=token,
          )

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[
                  ".git/*", ".github/*", "__pycache__/*", ".pytest_cache/*",
                  "*.pyc", "frontend/node_modules/*",
                  ".venv/*", "venv/*",
              ],
              commit_message="Deploy React + FastAPI from GitHub Actions",
              token=token,
          )
          print(f"Live at: https://huggingface.co/spaces/{repo_id}")
          print(f"App URL: https://vekri-automl-studio-classification.hf.space")
          PYEOF
