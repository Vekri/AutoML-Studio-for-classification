name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hugging Face (Docker Space)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN not set — create Space manually at huggingface.co/new-space (Docker SDK)"
            exit 0
          fi
          pip install huggingface_hub
          python << 'PYEOF'
          import os
          from huggingface_hub import HfApi, create_repo

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          repo_id = "Vekri/automl-studio-classification"

          create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
              token=token,
          )

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[
                  ".git/*", ".github/*", "__pycache__/*", ".pytest_cache/*",
                  "*.pyc", "frontend/node_modules/*", "frontend/dist/*",
                  ".venv/*", "venv/*",
              ],
              commit_message="Deploy React + FastAPI from GitHub Actions",
              token=token,
          )
          print(f"Live at: https://huggingface.co/spaces/{repo_id}")
          print(f"App URL: https://vekri-automl-studio-classification.hf.space")
          PYEOF
