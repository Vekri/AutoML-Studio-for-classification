name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build React app
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  test-backend:
    name: Test backend (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Verify backend and module syntax
        run: python -m py_compile backend/*.py config.py modules/*.py

      - name: Verify FastAPI app imports
        run: python -c "from backend.main import app; print(app.title)"

      - name: Run smoke tests
        run: pytest tests/ -v

      - name: Verify legacy Streamlit app syntax
        run: |
          pip install -r requirements.txt
          python -m py_compile app.py streamlit_app.py config.py modules/*.py

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [build-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build full-stack image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: automl-studio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
