# Native Python on Render free tier (no Docker build — more reliable)
# Prebuilt React UI is in frontend/dist (committed to repo)

services:
  - type: web
    name: automl-studio-classification
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
