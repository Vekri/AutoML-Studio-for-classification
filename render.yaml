# IntelliPredict — Render deployment (matches intellipredict-web.onrender.com pattern)
# Prebuilt React UI in frontend/dist; FastAPI serves landing + studio SPA

services:
  - type: web
    name: intellipredict-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
