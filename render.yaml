# Free hosting — Render (recommended) + Fly.io + Railway
# AutoML Studio: React + FastAPI Docker image

services:
  - type: web
    name: automl-studio-classification
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
