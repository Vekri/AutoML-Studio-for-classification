# fly.io free-tier friendly config
# Deploy: fly launch --no-deploy && fly deploy
# Docs: https://fly.io/docs/

app = "automl-studio-classification"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
